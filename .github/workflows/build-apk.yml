name: Build Anti-Car-Sickness APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission (无需gradlew，直接用gradle)
        run: chmod +x ./gradlew || true # 跳过失败，非必须

      - name: Build APK with Gradle
        run: |
          # 确保有执行权限
          chmod +x ./gradlew || true
          # 如果没有gradlew，使用系统gradle构建（备选方案）
          if [ ! -f "./gradlew" ]; then
            gradle clean assembleDebug
          else
            ./gradlew clean assembleDebug
          fi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: anti-carsickness-apk
          path: app/build/outputs/apk/debug/*.apk
